services:
  - type: web
    name: superagent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e . && python -m superagent.data.fetch_nflverse && python -m superagent.database
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: TOKEN_EXPIRY_DAYS
        value: "30"
      - key: RATE_LIMIT_PER_HOUR
        value: "100"
      - key: ENVIRONMENT
        value: production
      - key: BOOTSTRAP_NFL_DATA
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: superagent-postgres
          property: connectionString
    healthCheckPath: /health

databases:
  - name: superagent-postgres
    plan: free
    databaseName: superagent
    user: superagent
