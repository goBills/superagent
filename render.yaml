services:
  - type: web
    name: superagent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: ANTHROPIC_API_KEY
        scope: build,runtime
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: SECRET_KEY
        scope: build,runtime
      - key: ADMIN_TOKEN
        scope: build,runtime
      - key: TOKEN_EXPIRY_DAYS
        value: "30"
      - key: RATE_LIMIT_PER_HOUR
        value: "100"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: superagent-postgres
          property: connectionString
    healthCheckPath: /health
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 10

  - type: pserv
    name: superagent-postgres
    runtime: postgres15
    plan: free
    ipAllowList: []  # Allow from all
